name: Build and Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    working-directory: src

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Build
      run: dotnet build StreamDeck.csproj --configuration Release
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: 1

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: build
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Test
      run: dotnet test ../tests/StreamDeck.Tests/StreamDeck.Tests.csproj --verbosity normal
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: 1

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v5

    - name: Get main version
      run: echo "MAIN_VERSION=$(jq -r '.version' ../version.json)" >> $GITHUB_ENV
    - name: Get branch name from branch
      run: echo "BRANCH_NAME=$(echo $GITHUB_REF | awk 'BEGIN { FS = "/" } ; { print $3 }' | sed "s/[[:space:]_]/-/g")" >> $GITHUB_ENV
      if: startsWith(github.ref, 'refs/heads/')
    - name: Get branch name from PR
      run: echo "BRANCH_NAME=PR-$(echo $GITHUB_REF | awk 'BEGIN { FS = "/" } ; { print $3 }')" >> $GITHUB_ENV
      if: startsWith(github.ref, 'refs/pull/')

    - run: echo "PACKAGE_VERSION=${MAIN_VERSION}.${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV
      if: github.ref == 'refs/heads/main'
    - run: echo "PACKAGE_VERSION=${MAIN_VERSION}.${GITHUB_RUN_NUMBER}-${BRANCH_NAME}-${GITHUB_SHA::8}" >> $GITHUB_ENV
      if: github.ref != 'refs/heads/main'
    - run: echo Version is ${PACKAGE_VERSION}

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Build
      run: dotnet build StreamDeck.csproj --configuration Release /p:Version="${PACKAGE_VERSION}"
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: 1

    - name: Publish NuGet
      run: dotnet nuget push bin/Release/*.nupkg --skip-duplicate --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_KEY }}
    - name: Tag
      run: |
        git tag "v${PACKAGE_VERSION}"
        git push origin "v${PACKAGE_VERSION}"
      if: github.ref == 'refs/heads/main'
